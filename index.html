<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Códigos QR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f3f4f6;
            --text: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-stop {
            background-color: #ef4444;
        }
        .btn-stop:hover {
            background-color: #dc2626;
        }

        #reader {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px auto;
            border-radius: 8px;
            overflow: hidden;
        }

        .history-container {
            margin-top: 30px;
            text-align: left;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background-color: #f9fafb;
            color: #6b7280;
        }

        tr:hover {
            background-color: #f9fafb;
        }

        .no-data {
            color: #9ca3af;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Escáner QR Pro</h1>
        <p>Presiona el botón para iniciar la cámara y escanear un código.</p>
        
        <button id="btn-toggle" class="btn">Iniciar Cámara</button>
        
        <div id="reader" style="display: none;"></div>

        <div class="history-container">
            <h3>Códigos Escaneados</h3>
            <table>
                <thead>
                    <tr>
                        <th>Fecha y Hora</th>
                        <th>Contenido del QR</th>
                    </tr>
                </thead>
                <tbody id="history-table-body">
                    <tr id="row-empty">
                        <td colspan="2" class="no-data">No hay códigos escaneados aún.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const btnToggle = document.getElementById('btn-toggle');
        const readerDiv = document.getElementById('reader');
        const tableBody = document.getElementById('history-table-body');
        const rowEmpty = document.getElementById('row-empty');

        let html5QrCode = null;
        let isScanning = false;

        // Configuración del escáner
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        btnToggle.addEventListener('click', () => {
            if (!isScanning) {
                startScanner();
            } else {
                stopScanner();
            }
        });

        function startScanner() {
            readerDiv.style.display = 'block';
            
            // Inicializamos el objeto si no existe
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            // 'environment' intenta usar la cámara trasera en móviles
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess
            ).then(() => {
                isScanning = true;
                btnToggle.textContent = 'Detener Cámara';
                btnToggle.classList.add('btn-stop');
            }).catch(err => {
                console.error("Error al iniciar la cámara:", err);
                alert("No se pudo acceder a la cámara. Asegúrate de dar los permisos necesarios.");
                readerDiv.style.display = 'none';
            });
        }

        function stopScanner() {
            if (html5QrCode && isScanning) {
                html5QrCode.stop().then(() => {
                    isScanning = false;
                    btnToggle.textContent = 'Iniciar Cámara';
                    btnToggle.classList.remove('btn-stop');
                    readerDiv.style.display = 'none';
                }).catch(err => {
                    console.error("Error al detener la cámara:", err);
                });
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Detenemos el escáner momentáneamente tras una lectura exitosa
            stopScanner();
            
            // Sonido opcional o vibración (si el dispositivo lo permite)
            if (navigator.vibrate) navigator.vibrate(200);

            // Agregar los datos a la tabla
            addRecordToTable(decodedText);
        }

        function addRecordToTable(text) {
            // Remover el mensaje de "No hay códigos" si existe
            if (rowEmpty) {
                rowEmpty.remove();
            }

            // Obtener fecha y hora actual formateada
            const now = new Date();
            const dateTimeString = now.toLocaleString('es-ES', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            // Crear una nueva fila
            const row = document.createElement('tr');
            
            const cellDateTime = document.createElement('td');
            cellDateTime.textContent = dateTimeString;
            
            const cellText = document.createElement('td');
            // Si es un enlace, lo hacemos clickeable
            if (text.startsWith('http://') || text.startsWith('https://')) {
                const link = document.createElement('a');
                link.href = text;
                link.target = '_blank';
                link.textContent = text;
                cellText.appendChild(link);
            } else {
                cellText.textContent = text;
            }

            row.appendChild(cellDateTime);
            row.appendChild(cellText);

            // Insertar la nueva fila al principio de la tabla (historial reciente primero)
            tableBody.insertBefore(row, tableBody.firstChild);
        }
    </script>
</body>
</html>
